name: CI & Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch: # lets you build Windows installers on demand from the Actions tab

permissions:
  contents: write # tauri-action needs this to publish a Release on tag builds

jobs:
  # Fast feedback on every push/PR: typecheck-free build + the parity suite.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  # Windows installers (.msi + NSIS .exe) + standalone .exe.
  # Runs on manual dispatch or when a v* tag is pushed. On a tag, the installers
  # are attached to a GitHub Release; otherwise they are uploaded as run artifacts
  # you can download from the Actions run page.
  windows-build:
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: npm ci
      - name: Build app + installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a v* tag, publish a Release with the installers attached.
          # On manual dispatch, both are empty so it just builds (no release).
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Sweatbox Builder {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sweatbox-builder-windows
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
